# Config for a single-channel MDROBOT controller (MD400).
#
# Two sections:
#   mdrobot_hardware  - serial connection + controller settings. bringup.launch.py
#                       reads this and injects it into the URDF (the ros2_control
#                       hardware params); controller_manager ignores it. Edit your
#                       port / motor_id / counts_per_rev HERE instead of on the
#                       command line. (port and counts_per_rev can still be
#                       overridden with launch args.)
#   controller_manager / velocity_cont - the controllers themselves.
#
# joint_state_broadcaster verifies the read() path; velocity_cont
# (forward_command_controller) verifies the write() path by forwarding
# /velocity_cont/commands (std_msgs/Float64MultiArray) to motor1/velocity.
# velocity_cont needs ros2_controllers:  sudo apt install ros-jazzy-ros2-controllers
#
# Command units follow counts_per_rev: SI (rad/s) when set, else raw rpm.
mdrobot_hardware:
  ros__parameters:
    port: /dev/ttyUSB0
    baudrate: 19200
    motor_id: 1
    use_limit_sw: -1     # -1 leave as-is / 0 disable / 1 enable (some need 0 for serial)
    auto_enable: true
    counts_per_rev: 24.0  # ⚠ ESTIMATE — 8-pole MD400 hall (3 x 8). MEASURE yours (10-pole = 30). 0 = raw (rpm/count).

controller_manager:
  ros__parameters:
    update_rate: 20  # Hz — single read+write is ~2 serial round-trips.

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    velocity_cont:
      type: forward_command_controller/ForwardCommandController

velocity_cont:
  ros__parameters:
    joints:
      - motor1
    interface_name: velocity
