# Controllers for the diffbot example.
# wheel_separation / wheel_radius MUST match description/diffbot.urdf.xacro.
# update_rate is set by diffbot.launch.py (mock: 30 Hz, real dual: 15 Hz,
# serial-bound) — intentionally NOT here so the launch value is authoritative.
controller_manager:
  ros__parameters:
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_cont:
      type: diff_drive_controller/DiffDriveController

diff_cont:
  ros__parameters:
    left_wheel_names: ["left_wheel_joint"]
    right_wheel_names: ["right_wheel_joint"]

    wheel_separation: 0.30
    wheel_radius: 0.05

    base_frame_id: base_footprint
    odom_frame_id: odom
    enable_odom_tf: true
    open_loop: false
    publish_rate: 30.0

    cmd_vel_timeout: 0.5
    use_stamped_vel: false

    # Permissive limits — a generic driver leaves safety to the robot layer.
    linear:
      x:
        max_velocity: 0.6
        min_velocity: -0.6
        max_acceleration: 1.0
    angular:
      z:
        max_velocity: 2.0
        min_velocity: -2.0
